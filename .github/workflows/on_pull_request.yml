name: Pytest

on: [pull_request]

env:
  QUERIES_RESULTS_PATH: /tmp/queries-results.json

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.8

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: saleor
          POSTGRES_USER: saleor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v2

    - name: Dummy Dump
      run: echo "hello world" > ${QUERIES_RESULTS_PATH}

    - uses: NyanKiyoshi/pytest-django-queries-ci-tools@github-action-test
      with:
        query_raw_dump_path: ${{ env.QUERIES_RESULTS_PATH }}
        diff_endpoint: "https://example.com/diff"
        diff_results_base_url: "https://example.com/diffs"
        upload_endpoint: ${{ secrets.UPLOAD_ENDPOINT }}
        upload_secret_key: ${{ secrets.SECRET_UPLOAD_KEY }}

    - name: Setup Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.8"

    - name: Install system dependencies
      run: apt-get install libpq-dev

    - uses: actions/cache@v2
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements_dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install wheel
        python -m pip install -r requirements_dev.txt

    - name: Run tests
      run: pytest --cov --junitxml=junit/test-results.xml
      env:
        DATABASE_URL: "postgres://saleor:saleor@postgres:5432/saleor"
