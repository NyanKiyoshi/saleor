name: Pytest

on: [pull_request]

env:
  QUERIES_RESULTS_PATH: /tmp/queries-results.json

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.8

    steps:
    - uses: actions/checkout@v2

    - name: Setup Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.8"

    - name: Test
      run: |
        set -x
        env
        command -v python
        python -Im pip install pytest-django-queries
        command -v django-queries || echo no such command
        python -Im pytest_django_queries.cli || echo no such package
        command -v pip
        pip freeze || echo None
        pip install setuptools
        pip freeze || echo None
        python -Im pip freeze || echo None

    - uses: NyanKiyoshi/pytest-django-queries-ci-tools@composite-action
