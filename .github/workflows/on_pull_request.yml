name: Pytest

on: [pull_request]

env:
  QUERIES_RESULTS_PATH: /tmp/queries-results.json

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.8

    steps:
    - uses: actions/checkout@v2

    - name: Setup Python
      uses: actions/setup-python@v2
      with:
        python-version: "3.8"

    - name: Test
      run: |
        python -Im pip install pytest-django-queries

    - uses: NyanKiyoshi/pytest-django-queries-ci-tools@github-action-test
